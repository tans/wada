name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Convert wada.webp to icon
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build -Force | Out-Null
          magick wada.webp -define icon:auto-resize=16,24,32,48,64,128,256 build/icon.ico

      - name: Build Windows EXE
        run: npx electron-builder --win portable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe

      - name: Publish latest release (main / manual)
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          body: Automatically updated Windows portable build.
          allowUpdates: true
          makeLatest: true
          replacesArtifacts: true
          artifacts: dist/*.exe

      - name: Publish versioned release (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
