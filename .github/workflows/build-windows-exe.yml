name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Convert wada.webp to icon
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path build -Force | Out-Null
          magick wada.webp -define icon:auto-resize=16,24,32,48,64,128,256 build/icon.ico

      - name: Build Windows EXE
        run: npx electron-builder --win portable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/*.exe
